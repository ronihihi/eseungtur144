openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: E-Sign Workflow API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: documents
    description: Document management
  - name: recipients
    description: Recipient management
  - name: signing
    description: Public signing flow
  - name: admin
    description: Admin user management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /auth/me/signature:
    get:
      operationId: getSavedSignature
      tags: [auth]
      summary: Get the current user's saved signature
      responses:
        "200":
          description: Saved signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedSignatureResponse"
    put:
      operationId: saveSignature
      tags: [auth]
      summary: Save a signature for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSignatureRequest"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents for the current user
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a new document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                title:
                  type: string
                signing_order:
                  type: string
                  enum: [sequential, simultaneous]
              required:
                - document
      responses:
        "200":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document with its recipients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/recipients:
    post:
      operationId: setRecipients
      tags: [recipients]
      summary: Set recipients for a document (replaces existing)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRecipientsRequest"
      responses:
        "200":
          description: Recipients set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/fields:
    get:
      operationId: getDocumentFields
      tags: [documents]
      summary: Get signature field placements for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signature fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureFieldsResponse"
    put:
      operationId: saveDocumentFields
      tags: [documents]
      summary: Save signature field placements (replaces all)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveFieldsRequest"
      responses:
        "200":
          description: Fields saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{id}/send:
    post:
      operationId: sendDocument
      tags: [documents]
      summary: Send signing emails to recipients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDocumentRequest"
      responses:
        "200":
          description: Emails sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendDocumentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/status:
    get:
      operationId: getDocumentStatus
      tags: [documents]
      summary: Get signing status for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStatusResponse"

  /documents/{id}/activity:
    get:
      operationId: getDocumentActivity
      tags: [documents]
      summary: Get the append-only activity log for a document (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity log events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipients/{recipientId}/remind:
    post:
      operationId: remindRecipient
      tags: [recipients]
      summary: Send a reminder email to a recipient
      parameters:
        - name: recipientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reminder sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sign/{token}:
    get:
      operationId: getSigningInfo
      tags: [signing]
      summary: Get signing info for a recipient token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signing info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SigningInfoResponse"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: submitSignature
      tags: [signing]
      summary: Submit a signature for a recipient token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSignatureRequest"
      responses:
        "200":
          description: Signed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already signed or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Review not yet approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sign/{token}/review:
    post:
      operationId: submitReview
      tags: [signing]
      summary: Submit a review decision for a recipient token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitReviewRequest"
      responses:
        "200":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or already reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signing/my-requests:
    get:
      operationId: getMySigningRequests
      tags: [signing]
      summary: Get documents the current user has been asked to sign
      security:
        - sessionAuth: []
      responses:
        "200":
          description: List of signing requests for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MySigningRequestsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/azure-enabled:
    get:
      operationId: getAzureEnabled
      tags: [auth]
      summary: Check if Azure SSO is configured
      responses:
        "200":
          description: Azure SSO availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AzureEnabledResponse"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAdminUser
      tags: [admin]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/audit:
    get:
      operationId: getAdminAuditLog
      tags: [admin]
      summary: Get audit log of all document and signing events (admin only)
      responses:
        "200":
          description: Audit log events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/role:
    patch:
      operationId: updateAdminUserRole
      tags: [admin]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        hasSavedSignature:
          type: boolean
        role:
          type: string
          enum: [admin, user, auditor]
      required:
        - id
        - name
        - email
        - hasSavedSignature
        - role

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
      required:
        - success
        - user

    MeResponse:
      type: object
      properties:
        user:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"
      required:
        - user

    SavedSignatureResponse:
      type: object
      properties:
        signatureData:
          type: string
          nullable: true
      required:
        - signatureData

    SaveSignatureRequest:
      type: object
      properties:
        signatureData:
          type: string
      required:
        - signatureData

    SignatureField:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        recipientId:
          type: string
        page:
          type: integer
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        fieldType:
          type: string
          enum: [signature, initials, date, text]
        fieldValue:
          type: string
          nullable: true
      required:
        - id
        - documentId
        - recipientId
        - page
        - x
        - y
        - width
        - height
        - fieldType

    SignatureFieldInput:
      type: object
      properties:
        recipientId:
          type: string
        page:
          type: integer
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        fieldType:
          type: string
          enum: [signature, initials, date, text]
      required:
        - recipientId
        - page
        - x
        - y
        - width
        - height
        - fieldType

    SignatureFieldsResponse:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureField"
      required:
        - fields

    SaveFieldsRequest:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureFieldInput"
      required:
        - fields

    ReviewChecklistItem:
      type: object
      properties:
        label:
          type: string
        checked:
          type: boolean
      required:
        - label
        - checked

    Recipient:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        teamName:
          type: string
        email:
          type: string
        signOrder:
          type: integer
        status:
          type: string
          enum: [pending, viewed, signed]
        token:
          type: string
        signedAt:
          type: string
          nullable: true
        viewedAt:
          type: string
          nullable: true
        signerName:
          type: string
          nullable: true
        signatureData:
          type: string
          nullable: true
          description: Base64-encoded signature image (present when signed)
        createdAt:
          type: string
        requiresReview:
          type: boolean
        requiresSignature:
          type: boolean
        reviewStatus:
          type: string
          nullable: true
          enum: [pending, approved, changes_requested]
        reviewedAt:
          type: string
          nullable: true
        reviewNote:
          type: string
          nullable: true
        reviewChecklist:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ReviewChecklistItem"
      required:
        - id
        - documentId
        - teamName
        - email
        - signOrder
        - status
        - token
        - createdAt
        - requiresReview
        - requiresSignature

    Document:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        filename:
          type: string
        signingOrder:
          type: string
          enum: [sequential, simultaneous]
        status:
          type: string
          enum: [draft, in_review, sent, changes_requested, completed]
        uploadedBy:
          type: string
        uploaderName:
          type: string
        createdAt:
          type: string
        completedAt:
          type: string
          nullable: true
        totalRecipients:
          type: integer
        signedCount:
          type: integer
      required:
        - id
        - title
        - filename
        - signingOrder
        - status
        - uploadedBy
        - uploaderName
        - createdAt
        - totalRecipients
        - signedCount

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required:
        - documents

    UploadDocumentResponse:
      type: object
      properties:
        success:
          type: boolean
        documentId:
          type: string
      required:
        - success
        - documentId

    DocumentDetailResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/Recipient"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureField"
      required:
        - document
        - recipients
        - fields

    RecipientInput:
      type: object
      properties:
        teamName:
          type: string
        email:
          type: string
          format: email
        requiresReview:
          type: boolean
          default: false
        requiresSignature:
          type: boolean
          default: true
        reviewChecklist:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
            required:
              - label
      required:
        - teamName
        - email

    SetRecipientsRequest:
      type: object
      properties:
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/RecipientInput"
          maxItems: 20
      required:
        - recipients

    SendDocumentRequest:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string

    SendDocumentResponse:
      type: object
      properties:
        success:
          type: boolean
        sent:
          type: integer
      required:
        - success
        - sent

    DocumentStatusResponse:
      type: object
      properties:
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/Recipient"
        status:
          type: string
      required:
        - recipients
        - status

    SigningInfoResponse:
      type: object
      properties:
        recipient:
          $ref: "#/components/schemas/Recipient"
        documentTitle:
          type: string
        documentFilename:
          type: string
        alreadySigned:
          type: boolean
        documentStatus:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureField"
        allSignedFields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureField"
        nextStep:
          type: string
          enum: [review, sign, done, blocked]
        approvedReviewers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              teamName:
                type: string
              reviewedAt:
                type: string
            required:
              - name
              - teamName
              - reviewedAt
      required:
        - recipient
        - documentTitle
        - documentFilename
        - alreadySigned
        - documentStatus
        - fields
        - nextStep

    SubmitSignatureRequest:
      type: object
      properties:
        fullName:
          type: string
          maxLength: 200
        signatureData:
          type: string
          nullable: true
          description: Base64-encoded signature image (required when signing signature/initials fields)
        fieldValues:
          type: object
          description: Map of fieldId to value for text and date fields
          additionalProperties:
            type: string
            maxLength: 2000
      required:
        - fullName

    AzureEnabledResponse:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled

    AdminUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user, auditor]
        provider:
          type: string
          enum: [local, azure]
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - provider
        - createdAt

    AdminUserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
      required:
        - users

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user, auditor]
      required:
        - name
        - email
        - password

    UpdateRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, user, auditor]
      required:
        - role

    AuditEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
